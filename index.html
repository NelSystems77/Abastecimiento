<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selector de Productos y Generador de PDF</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header>
        <h1>Selector de Productos</h1>
    </header>

    <div class="search-container">
        <div style="display: flex; gap: 10px;">
            <input type="text" id="searchInput" placeholder="Buscar producto por nombre...">
            <button id="btnAddNew" class="btn-secondary" title="Crear producto nuevo">+ Nuevo</button>
        </div>
        <div id="productResults" class="results-list"></div>
        <button id="btnLoadMaster" class="btn-secondary" style="background-color: #4CAF50;">Cargar Listado Maestro</button>

    </div>

    <div class="selected-container">
        <h2>Productos Seleccionados</h2>
        <div class="table-responsive">
            <table id="selectedTable">
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Cantidad Solicitada</th>
                        <th>Cantidad Recibida</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="selectedTableBody">
                    </tbody>
            </table>
        </div>
        <div id="noSelectedMessage" class="no-results">No hay productos seleccionados.</div>
        <div style="text-align:center; display: flex; gap: 10px; justify-content: center; margin-top: 20px;">
            <button id="generatePDF" class="btn-primary" disabled>Generar PDF Lista</button>
            <button id="generatePDF2" class="btn-primary" style="background-color: #f39c12;">Generar PDF Turnos (Maestro 1-146)</button>
        </div>
    </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

<script src="script.js"></script>
</body>
</html>
